<!doctype html>
<html lang="en" data-theme="cerberus">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AdoVibes</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('adovibes-theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = saved === 'dark' || (saved !== 'light' && prefersDark);
          document.documentElement.classList.toggle('dark', isDark);
        } catch {}
      })();
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html.dark body {
        background: #020617;
        color: #e2e8f0;
      }
      .boot-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 0;
        opacity: 1;
        visibility: visible;
        transition: opacity 160ms ease, visibility 160ms ease;
      }
      body[data-app-ready="true"] .boot-shell {
        opacity: 0;
        visibility: hidden;
      }
      .boot-card {
        width: min(26rem, calc(100vw - 2rem));
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 1.5rem;
        text-align: center;
      }
      html.dark .boot-card {
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.45);
      }
      .boot-title {
        margin: 0;
        color: #2563eb;
        font-size: 1.5rem;
        font-weight: 700;
      }
      .boot-copy {
        margin: 0.5rem 0 0;
        color: inherit;
        opacity: 0.75;
        font-size: 0.95rem;
      }
      .boot-spinner {
        width: 2rem;
        height: 2rem;
        margin: 1rem auto 0;
        border: 2px solid rgba(37, 99, 235, 0.2);
        border-top-color: #2563eb;
        border-radius: 9999px;
        animation: boot-spin 0.8s linear infinite;
      }
      #svelte {
        position: relative;
        z-index: 1;
        min-height: 100%;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="boot-shell" aria-hidden="true">
      <div class="boot-card">
        <h1 class="boot-title">AdoVibes</h1>
        <p class="boot-copy">Preparing your Azure DevOps board...</p>
        <div class="boot-spinner"></div>
      </div>
    </div>
    <div id="svelte" style="display: contents">%sveltekit.body%</div>
  </body>
</html>
